name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Syntax and typecheck
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run checks
        run: npm run check
